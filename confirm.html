<script>

let slot = localStorage.getItem("slot");
let place = localStorage.getItem("place");

document.getElementById("slotInfo").innerText =
  "Selected Slot: " + (parseInt(slot)+1);

function submit(){

  let u = document.getElementById("user").value;
  let v = document.getElementById("vehicle").value;

  if(u=="" || v==""){
    alert("Please fill all details");
    return;
  }

  // Get saved data
  let data = JSON.parse(localStorage.getItem("parkingData"));

  // Mark slot as booked
  data[place][slot] = 1;

  // Save again
  localStorage.setItem("parkingData", JSON.stringify(data));

  // Save user details
  localStorage.setItem("username", u);
  localStorage.setItem("vehicle", v);

  window.location = "result.html";
}
</script>
