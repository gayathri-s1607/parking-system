<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: url('car.jpg') no-repeat center center/cover;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.login-box {
    position: relative;
    z-index: 1;
    width: 300px;
    padding: 30px;
    text-align: center;
    border-radius: 15px;

    background: linear-gradient(135deg, #ff4e50, #f9d423);
    border: 2px solid white;
    box-shadow: 0 0 20px white, 0 0 40px white;
}

.login-box h2 {
    color: white;
}

.login-box input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
}

.login-box button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: black;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.login-box button:hover {
    background: #333;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    window.location.href = "place.html"; // ✅ NOW GOES TO PLACE PAGE
}
</script>

</body>
</html>
